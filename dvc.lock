schema: '2.0'
stages:
  feature_extraction:
    cmd: python delius/feature_extraction.py --input_compressed_image_dir ./data/raw/images.tar.gz
      --output_uncompressed_image_dir ./data/interim/images/ --output_embedding_file
      ./data/processed/embeddings.pth --image_width 224 --image_height 224 --batch_size
      256
    deps:
    - path: ./data/raw/images.tar.gz
      hash: md5
      md5: a5a0f9454e3dd56c5d7579782c255d9f
      size: 2173727123
    outs:
    - path: ./data/processed/embeddings.pth
      hash: md5
      md5: fdfb826267693e58d5ee6de848ea1e1a
      size: 491909125
  autoencoder_pretraining:
    cmd: python -m delius.autoencoder_pretraining --learning_rate 0.001 --epochs 200
      --batch 256 --encoder_hidden_dimensions 500 500 2000 10 --input_embeddings_dimensions
      1024 --input_embeddings_file ./data/processed/embeddings.pth --output_encoder_file
      ./models/pretrained/model.pth
    deps:
    - path: ./data/processed/embeddings.pth
      hash: md5
      md5: fdfb826267693e58d5ee6de848ea1e1a
      size: 491909125
    - path: delius/autoencoder_pretraining.py
      hash: md5
      md5: 9097169902b2fad7ad3e247f368a365a
      size: 2572
    outs:
    - path: ./models/pretrained/model.pth
      hash: md5
      md5: d4f140524346a455f91532be69bb961c
      size: 7143016
  clustering_initialization:
    cmd: python -m delius.clustering_initialization --batch 256 --encoder_hidden_dimensions
      500 500 2000 10 --input_embeddings_dimensions 1024 --input_embeddings_file ./data/processed/embeddings.pth
      --input_pretrained_encoder_file ./models/pretrained/model.pth --output_centroids_file
      ./models/kmeans/centroids.pth --n_clusters 5
    deps:
    - path: ./data/processed/embeddings.pth
      hash: md5
      md5: fdfb826267693e58d5ee6de848ea1e1a
      size: 491909125
    - path: ./models/pretrained/model.pth
      hash: md5
      md5: d4f140524346a455f91532be69bb961c
      size: 7143016
    - path: delius/clustering_initialization.py
      hash: md5
      md5: e2b0bd2968e44cb0921366ecc5d25962
      size: 2642
    outs:
    - path: ./models/kmeans/centroids.pth
      hash: md5
      md5: 742cc85c7bd2d4186eb62e9e747bc220
      size: 1382
